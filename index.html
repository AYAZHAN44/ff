<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
:root{
  --bg:#07070f;
  --bg2:#0f0f1d;
  --bg3:#161625;
  --card:#131320;
  --card2:#1a1a2e;
  --accent:#ff4500;
  --accent2:#ff7a00;
  --gold:#ffb800;
  --green:#00d68f;
  --blue:#4a9eff;
  --red:#ff3b5c;
  --text:#f2f0fb;
  --text2:#9896b0;
  --text3:#4e4c66;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --glow:rgba(255,69,0,0.15);
  --shadow:0 20px 60px rgba(0,0,0,0.5);
}
body{background:var(--bg);min-height:100vh;font-family:'DM Sans',sans-serif;color:var(--text);overflow-x:hidden}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}

/* TYPOGRAPHY */
.font-display{font-family:'Syne',sans-serif}

/* LAYOUT */
.page{min-height:100vh;padding-bottom:90px}
.container{max-width:680px;margin:0 auto;padding:0 1rem}
.container-wide{max-width:1100px;margin:0 auto;padding:0 1.5rem}

/* HEADER */
.main-header{position:sticky;top:0;z-index:200;background:rgba(7,7,15,0.92);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border)}
.header-inner{height:62px;display:flex;align-items:center;justify-content:space-between}

/* LOGO */
.logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px var(--glow)}
.logo-text{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,#ff4500,#ffb800);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(7,7,15,0.97);backdrop-filter:blur(24px);border-top:1px solid var(--border);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;cursor:pointer;color:var(--text3);font-size:10px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:5px;transition:all .22s;font-family:'DM Sans',sans-serif;letter-spacing:.3px;text-transform:uppercase}
.bnav-btn.act{color:var(--accent)}
.bnav-icon{font-size:22px;line-height:1;position:relative}
.bnav-badge{position:absolute;top:-6px;right:-8px;background:var(--red);color:#fff;border-radius:50%;min-width:16px;height:16px;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;padding:0 3px}

/* DESKTOP NAV */
.desktop-nav{position:sticky;top:0;z-index:200;background:rgba(7,7,15,0.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:none}
@media(min-width:768px){.desktop-nav{display:block}.bnav{display:none}.page{padding-bottom:30px}}
.desktop-nav-inner{height:68px;display:flex;align-items:center;justify-content:space-between}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:14px;font-weight:600;cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;letter-spacing:.2px;outline:none}
.btn:active{transform:scale(.96)}
.btn-fire{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;padding:14px 24px;font-size:15px;font-weight:700;box-shadow:0 6px 24px var(--glow)}
.btn-fire:hover{filter:brightness(1.1);box-shadow:0 8px 32px var(--glow)}
.btn-outline{background:transparent;color:var(--text);border:1.5px solid var(--border2);padding:12px 20px;font-size:14px}
.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost{background:rgba(255,255,255,0.05);color:var(--text2);padding:10px 18px;font-size:13px;border-radius:12px}
.btn-ghost:hover{background:rgba(255,255,255,0.09);color:var(--text)}
.btn-sm{padding:8px 16px;font-size:13px;border-radius:10px}
.btn-xs{padding:6px 12px;font-size:12px;border-radius:8px}
.btn-card{background:var(--card2);color:var(--text);border:1px solid var(--border);padding:11px 18px;font-size:14px;border-radius:12px}
.btn-card:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(255,59,92,.12);color:var(--red);border:1px solid rgba(255,59,92,.25);padding:10px 16px;font-size:13px}
.btn-danger:hover{background:rgba(255,59,92,.22)}
.btn-green{background:rgba(0,214,143,.12);color:var(--green);border:1px solid rgba(0,214,143,.25);padding:10px 16px;font-size:13px}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* INPUTS */
.inp{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;font-size:15px;color:var(--text);outline:none;transition:all .2s;-webkit-appearance:none;font-family:'DM Sans',sans-serif}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,69,0,.12)}
.inp::placeholder{color:var(--text3)}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.card-hover{transition:all .22s;cursor:pointer}
.card-hover:hover{border-color:rgba(255,69,0,.3);transform:translateY(-2px);box-shadow:0 12px 40px rgba(255,69,0,.1)}
.card-hover:active{transform:translateY(0)}

/* BADGE */
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;letter-spacing:.4px}
.badge-fire{background:rgba(255,69,0,.12);color:var(--accent);border:1px solid rgba(255,69,0,.2)}
.badge-gold{background:rgba(255,184,0,.12);color:var(--gold);border:1px solid rgba(255,184,0,.2)}
.badge-green{background:rgba(0,214,143,.1);color:var(--green);border:1px solid rgba(0,214,143,.2)}
.badge-blue{background:rgba(74,158,255,.1);color:var(--blue);border:1px solid rgba(74,158,255,.2)}

/* TOAST */
.toast-wrap{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
@media(min-width:768px){.toast-wrap{bottom:30px}}
.toast{background:var(--card2);border:1px solid rgba(255,69,0,.3);border-radius:16px;padding:13px 22px;font-size:14px;font-weight:600;white-space:nowrap;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .25s}
@media(min-width:768px){.modal-bg{align-items:center}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:28px 28px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;animation:slideUp .3s ease}
@media(min-width:768px){.modal{border-radius:28px;max-height:85vh}}
@keyframes slideUp{from{transform:translateY(30px);opacity:.5}to{transform:translateY(0);opacity:1}}

/* HERO */
.hero{background:linear-gradient(135deg,#0d0d20 0%,#1a0a08 50%,#0d0d20 100%);position:relative;overflow:hidden;padding:2.5rem 0 2rem}
.hero::before{content:'';position:absolute;top:-50%;left:-20%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(255,69,0,.12) 0%,transparent 70%);pointer-events:none}
.hero::after{content:'';position:absolute;bottom:-30%;right:-10%;width:50%;height:150%;background:radial-gradient(ellipse,rgba(255,184,0,.08) 0%,transparent 70%);pointer-events:none}

/* RESTAURANT CARD */
.rest-img{width:100%;height:200px;object-fit:cover;display:block;transition:transform .4s}
.rest-card:hover .rest-img{transform:scale(1.04)}
.rest-img-wrap{height:200px;overflow:hidden;position:relative}

/* CATEGORY PILLS */
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{white-space:nowrap;padding:9px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;border:none;font-family:'DM Sans',sans-serif;flex-shrink:0}
.cat-pill.act{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px var(--glow)}
.cat-pill:not(.act){background:var(--card);color:var(--text2);border:1px solid var(--border)}
.cat-pill:not(.act):hover{border-color:var(--accent);color:var(--accent)}

/* MENU ITEM */
.menu-item{display:flex;gap:0;cursor:pointer;transition:all .2s}
.menu-item:hover{border-color:rgba(255,69,0,.25)}
.mi-img{width:100px;height:100px;object-fit:cover;flex-shrink:0}

/* QTY CONTROL */
.qty-ctrl{display:flex;align-items:center;gap:10px}
.qty-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;transition:all .18s;font-family:'DM Sans',sans-serif}
.qty-btn-minus{background:var(--card2);color:var(--text2);border:1px solid var(--border)}
.qty-btn-minus:hover{border-color:var(--accent);color:var(--accent)}
.qty-btn-plus{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 12px var(--glow)}
.qty-num{font-weight:800;min-width:24px;text-align:center;font-size:16px;font-family:'Syne',sans-serif}

/* STEP TRACKER */
.step-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .4s;flex-shrink:0}
.step-line{width:2px;flex:1;min-height:28px;margin:4px auto;transition:background .4s}

/* TOGGLE */
.toggle{width:52px;height:28px;border-radius:14px;position:relative;cursor:pointer;border:none;transition:background .3s;flex-shrink:0}
.toggle-thumb{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 2px 6px rgba(0,0,0,.3)}

/* CART STICKY */
.cart-sticky{position:sticky;bottom:90px;z-index:100;padding:1rem 0 0}
@media(min-width:768px){.cart-sticky{bottom:24px}}

/* COMBO */
.combo-card{background:linear-gradient(135deg,rgba(255,69,0,.08),rgba(255,184,0,.06));border:1px solid rgba(255,184,0,.2);border-radius:20px;padding:1.25rem;cursor:pointer;transition:all .2s}
.combo-card:hover{border-color:rgba(255,184,0,.4);transform:translateY(-2px);box-shadow:0 12px 32px rgba(255,184,0,.08)}

/* STARS */
.stars{color:var(--gold);font-size:13px;letter-spacing:1px}

/* SECTION */
.section{padding:1.5rem 0}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:1.25rem}

/* TABS */
.tab-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.tab-row::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;border:none;font-family:'DM Sans',sans-serif;transition:all .18s;flex-shrink:0}
.tab-btn.act{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.tab-btn:not(.act){background:var(--card);color:var(--text2);border:1px solid var(--border)}

/* ADMIN TABLE */
.atable{width:100%;border-collapse:collapse;font-size:14px}
.atable th{padding:10px 12px;color:var(--text3);text-align:left;font-weight:600;border-bottom:1px solid var(--border);font-size:12px;text-transform:uppercase;letter-spacing:.5px}
.atable td{padding:12px;border-bottom:1px solid rgba(255,255,255,.03)}
.atable tr:hover td{background:rgba(255,255,255,.02)}

/* MAP */
canvas.map{border-radius:0;display:block;width:100%}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;background:var(--bg)}

/* PROMO BANNER */
.promo-banner{background:linear-gradient(135deg,#1a0800,#2d1000,#1a0800);border:1px solid rgba(255,69,0,.25);border-radius:22px;padding:1.5rem;position:relative;overflow:hidden}
.promo-banner::before{content:'';position:absolute;top:-40px;right:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,69,0,.2),transparent 70%);pointer-events:none}

/* SCROLLABLE HORIZONTAL */
.h-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none}
.h-scroll::-webkit-scrollbar{display:none}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease forwards}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:400px){.grid-2{grid-template-columns:1fr}}

/* PAY OPTION */
.pay-opt{border-radius:16px;padding:1.25rem;cursor:pointer;transition:all .2s;border:2px solid var(--border)}
.pay-opt.sel{border-color:var(--accent);background:rgba(255,69,0,.06)}
.pay-opt:not(.sel):hover{border-color:var(--border2)}

/* SHIMMER */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>

// ========== HELPERS ==========
const t = k => (L[S.lang]||L.ru)[k]||k;
const cartQty = () => Object.values(S.cart).reduce((a,b)=>a+b,0);
const cartSum = () => Object.entries(S.cart).reduce((s,[id,q])=>{
  const m=S.cartMeta[id]; return s+(m?m.price*q:0);
},0);

function go(page, data=null){
  S.prevPage=S.page;
  if(page==="rest"&&data) S.rest=data;
  if(page==="tracking") startTrack();
  S.page=page;
  S.search="";
  if(page==="rest") S.restTab=null;
  window.scrollTo(0,0);
  R();
}

function toast(msg){
  S.toastMsg=msg;
  clearTimeout(S._toastT);
  S._toastT=setTimeout(()=>{S.toastMsg=null;R();},2600);
  R();
}

function addItem(item){
  const id=String(item.id);
  S.cart[id]=(S.cart[id]||0)+1;
  S.cartMeta[id]=item;
  LSS("cart",S.cart); LSS("cartMeta",S.cartMeta);
  toast("🛒 "+( S.lang==="ru"?(item.name_ru||item.name):(item.name_kk||item.name))+" "+t("added")+"!");
}

function updQty(id,d){
  id=String(id);
  const nv=Math.max(0,(S.cart[id]||0)+d);
  if(nv===0) delete S.cart[id]; else S.cart[id]=nv;
  LSS("cart",S.cart);
  R();
}

function startTrack(){
  S.trackStep=0; S.trackEta=28;
  clearInterval(S.trackTimer);
  [0,8000,18000,30000,45000].forEach((ms,i)=>setTimeout(()=>{S.trackStep=i;R();},ms));
  S.trackTimer=setInterval(()=>{S.trackEta=Math.max(0,S.trackEta-.05);R();},3000);
}

// ========== RENDER ==========
function R(){
  const app=document.getElementById("root");
  app.innerHTML=build();
  attachEv();
  const mc=document.getElementById("map-cv");
  const cc=document.getElementById("cou-map");
  if(mc) drawMap(mc,STATUSES_RU[S.trackStep]?.key||"placed");
  if(cc) drawMap(cc,["placed","prep","pickup","done"][S.couStep]||"placed");
}

function build(){
  let toastHtml="";
  if(S.toastMsg) toastHtml=`<div class="toast-wrap"><div class="toast">${S.toastMsg}</div></div>`;

  let content="";
  switch(S.page){
    case "home":       content=bHome(); break;
    case "rest":       content=bRest(); break;
    case "cart":       content=bCart(); break;
    case "payment":    content=bPayment(); break;
    case "tracking":   content=bTracking(); break;
    case "account":    content=bAccount(); break;
    case "courier":    content=bCourier(); break;
    case "admin":      content=bAdmin(); break;
    case "adminLogin": content=bAdminLogin(); break;
    default:           content=bHome();
  }
  const skip=["admin","adminLogin","courier"];
  const bn=skip.includes(S.page)?"":bBNav();
  const dn=skip.includes(S.page)?"":bDNav();
  return `${dn}${content}${bn}${toastHtml}`;
}

function bBNav(){
  const cnt=cartQty();
  const items=[
    {id:"home",ic:"🏠",lb:t("home")},
    {id:"cart",ic:"🛒",lb:t("cart"),cnt},
    {id:"account",ic:"👤",lb:t("acc")},
  ];
  return `<nav class="bnav">${items.map(i=>`
    <button class="bnav-btn ${S.page===i.id?"act":""}" onclick="go('${i.id}')">
      <span class="bnav-icon">${i.ic}${i.cnt>0?`<span class="bnav-badge">${i.cnt}</span>`:""}</span>
      <span>${i.lb}</span>
    </button>`).join("")}</nav>`;
}

        </button>
      </div>
    </div></div></nav>`;
}

// ===== RESTAURANT =====
function bRest(){
  const rid=S.rest;
  const r=RESTS.find(x=>x.id===rid);
  if(!r){go("home");return "";}
  const ln=S.lang;
  if(!S.restTab && r.sections.length>0) S.restTab=r.sections[0].id;
  const sec=r.sections.find(s=>s.id===S.restTab)||r.sections[0];

  const secBtns=r.sections.map(s=>`
    <button class="tab-btn ${S.restTab===s.id?"act":""}" onclick="S.restTab='${s.id}';R()">
      ${ln==="kk"?s.name_kk:s.name_ru}
    </button>`).join("");

  const sc=S.search.toLowerCase();
  const items=(sec?sec.items:[]).filter(i=>{
    if(!sc) return true;
    const nm=ln==="kk"?(i.name_kk||i.name_ru):(i.name_ru||"");
    return nm.toLowerCase().includes(sc);
  });

  const isCombo=sec&&sec.id==="combos";

  const itemsHtml=items.map(item=>{
    const nm=ln==="kk"?(item.name_kk||item.name_ru):(item.name_ru||"");
    const ds=ln==="kk"?(item.desc_kk||item.desc_ru):(item.desc_ru||"");
    const qty=S.cart[String(item.id)]||0;
    if(isCombo){
      return `<div class="combo-card" onclick="addItemById(${r.id},'${sec.id}',${item.id})">

          <img src="${item.img}" alt="${nm}" style="width:90px;height:90px;object-fit:cover;border-radius:14px;flex-shrink:0" loading="lazy" onerror="this.style.display='none'"/>
          <div style="flex:1">
            <div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              ${item.popular?`<span class="badge badge-fire">🔥 Хит</span>`:""}
              ${item.new?`<span class="badge badge-blue">✨ ${t("new")}</span>`:""}
            </div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px;margin-bottom:4px">${nm}</div>
            <div style="color:var(--text2);font-size:12px;line-height:1.4;margin-bottom:8px">${ds}</div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-family:'Syne',sans-serif;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${item.price.toLocaleString()}₸</span>
              ${qty>0?`<div class="qty-ctrl">
                <button class="qty-btn qty-btn-minus" onclick="event.stopPropagation();updQty(${item.id},-1)">−</button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn qty-btn-plus" onclick="event.stopPropagation();updQty(${item.id},1)">+</button>
              </div>`:`<button class="btn btn-fire btn-sm" onclick="event.stopPropagation();addItemById(${r.id},'${sec.id}',${item.id})">+ ${t("add")}</button>`}
            </div>
          </div>
        </div>
      </div>`;
    }
    return `<div class="card menu-item card-hover" style="margin-bottom:10px">
      <img src="${item.img}" alt="${nm}" class="mi-img" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&q=70'"/>
      <div style="flex:1;padding:.75rem 1rem">
        <div style="display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap">
          ${item.popular?`<span class="badge badge-fire" style="font-size:10px">🔥 Хит</span>`:""}
          ${item.new?`<span class="badge badge-blue" style="font-size:10px">✨ ${t("new")}</span>`:""}
          ${item.veg?`<span class="badge badge-green" style="font-size:10px">🌿 Veg</span>`:""}
          ${item.spicy?`<span class="badge badge-fire" style="font-size:10px">🌶️ ${t("spicy")}</span>`:""}
        </div>
        <div style="font-weight:700;font-size:14px;margin-bottom:3px;line-height:1.3">${nm}</div>
        ${ds?`<div style="color:var(--text2);font-size:12px;margin-bottom:4px;line-height:1.4">${ds}</div>`:""}
        <div style="font-size:11px;color:var(--text3);margin-bottom:8px">${item.cal} ${t("cal")}</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${item.price.toLocaleString()}₸</span>
          ${qty>0?`<div class="qty-ctrl">
            <button class="qty-btn qty-btn-minus" onclick="updQty(${item.id},-1)">−</button>
            <span class="qty-num">${qty}</span>
            <button class="qty-btn qty-btn-plus" onclick="updQty(${item.id},1)">+</button>
          </div>`:`<button class="btn btn-fire btn-sm" onclick="addItemById(${r.id},'${sec.id}',${item.id})">+ ${t("add")}</button>`}
        </div>
      </div>
    </div>`;
  }).join("");

  return `<div class="page">
    <div class="main-header">
      <div class="container"><div class="header-inner">
        <button class="btn btn-ghost btn-sm" onclick="go('home')">← ${t("back")}</button>
        <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px">${r.name}</div>
        <button class="btn btn-fire btn-sm" onclick="go('cart')" style="padding:9px 14px">🛒 ${cartQty()}</button>
      </div></div>
    </div>

    <!-- COVER -->
    <div style="height:220px;position:relative;overflow:hidden">
      <img src="${r.cover||r.img}" alt="${r.name}" style="width:100%;height:100%;object-fit:cover" loading="lazy"/>
      <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(7,7,15,1) 0%,rgba(7,7,15,.3) 60%,transparent 100%)"></div>
      <div style="position:absolute;bottom:0;left:0;right:0;padding:1rem">
        <div class="container">
          <h1 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px">${r.name}</h1>
          <p style="color:rgba(255,255,255,.7);font-size:13px;margin-bottom:6px">${ln==="kk"?r.desc_kk:r.desc_ru}</p>
          <div style="display:flex;gap:12px;font-size:13px;color:rgba(255,255,255,.75);flex-wrap:wrap">
            <span style="color:var(--gold)">★ ${r.rating}</span>
            <span>⏱ ${r.time} ${t("min")}</span>
            <span>🚚 ${r.price===0?`<span style="color:var(--green)">${t("free")}</span>`:r.price+"₸"}</span>
            <span>📦 ${r.count.toLocaleString()}</span>
          </div>
        </div>
      </div>
    </div>

    <div class="container">
      <!-- SEARCH -->
      <div style="padding:1rem 0 .75rem;position:relative">
        <span style="position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:14px">🔍</span>
        <input class="inp" style="padding-left:42px" placeholder="${t("search")}" value="${S.search}" oninput="S.search=this.value;R()"/>
      </div>

      <!-- SECTION TABS -->
      <div class="tab-row" style="margin-bottom:1.25rem">${secBtns}</div>

      <!-- SECTION TITLE -->
      ${isCombo?`<div style="background:linear-gradient(135deg,rgba(255,69,0,.08),rgba(255,184,0,.05));border:1px solid rgba(255,184,0,.15);border-radius:16px;padding:1rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:12px">
        <span style="font-size:32px">🔥</span>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:800;font-size:15px">${ln==="kk"?(sec.name_kk||sec.name_ru):(sec.name_ru||"")}</div>
          <div style="color:var(--text2);font-size:12px;margin-top:2px">${S.lang==="ru"?"Выгодные наборы — экономьте до 30%":"Тиімді жиынтықтар — 30% дейін үнемдеңіз"}</div>
        </div>
      </div>`:""}

      <!-- ITEMS -->
      <div style="margin-bottom:1.5rem">
        ${itemsHtml||`<div style="text-align:center;padding:2rem;color:var(--text3)">${S.lang==="ru"?"Ничего не найдено":"Табылмады"}</div>`}
      </div>

      <!-- CART BTN STICKY -->
      ${cartQty()>0?`<div class="cart-sticky">
        <button class="btn btn-fire" style="width:100%;padding:16px;font-size:15px;border-radius:18px" onclick="go('cart')">
          🛒 ${t("cart")} — ${cartSum().toLocaleString()}₸
        </button>
      </div>`:""}
    </div>
  </div>`;
}

function addItemById(restId, secId, itemId){
  const r=RESTS.find(x=>x.id===restId);
  if(!r) return;
  const sec=r.sections.find(s=>s.id===secId);
  if(!sec) return;
  const item=sec.items.find(i=>i.id===itemId);
  if(item) addItem(item);
}

// ===== CART =====
function bCart(){
  const items=Object.entries(S.cart).map(([id,qty])=>{
    const m=S.cartMeta[id]; if(!m) return null; return{...m,qty,id};
  }).filter(Boolean);
  const sub=cartSum();
  const del=sub>5000?0:499;
  const disc=S.promoApplied?Math.round(sub*.2):0;
  const total=sub+del-disc;

  if(items.length===0){
    return `<div class="page">
      <div class="main-header"><div class="container"><div class="header-inner">
        <button class="btn btn-ghost btn-sm" onclick="go('home')">← ${t("back")}</button>
        <span style="font-family:'Syne',sans-serif;font-weight:800">🛒 ${t("cart")}</span>
        <div></div>
      </div></div></div>

  const payOpts=[
    {id:"kaspi",ic:"🟠",lb:"Kaspi Pay",ds:S.lang==="ru"?"QR-код оплата":"QR-код төлем"},
    {id:"card",ic:"💳",lb:S.lang==="ru"?"Банковская карта":"Банк картасы",ds:"Visa · Mastercard"},
    {id:"cash",ic:"💵",lb:S.lang==="ru"?"Наличные":"Қолма-қол",ds:S.lang==="ru"?"Оплата курьеру":"Курьерге төлем"},
  ];

  return `<div class="page">
    <div class="main-header"><div class="container"><div class="header-inner">
      <button class="btn btn-ghost btn-sm" onclick="go('home')">← ${t("back")}</button>
      <span style="font-family:'Syne',sans-serif;font-weight:800">🛒 ${t("cart")}</span>
      <div></div>
    </div></div></div>
    <div class="container" style="padding-top:1.25rem">
      <h3 style="font-size:14px;font-weight:600;color:var(--text2);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:.5px">${S.lang==="ru"?"Ваши блюда":"Сіздің тағамдарыңыз"} · ${items.length}</h3>
      ${items.map(item=>{
        const nm=S.lang==="kk"?(item.name_kk||item.name_ru):(item.name_ru||"");
        return `<div class="card" style="display:flex;overflow:hidden;margin-bottom:10px;padding:0">
          <img src="${item.img||""}" alt="${nm}" style="width:80px;height:80px;object-fit:cover;flex-shrink:0" onerror="this.style.display='none'" loading="lazy"/>
          <div style="flex:1;padding:.75rem">
            <div style="font-weight:700;font-size:14px;margin-bottom:2px">${nm}</div>
            <div style="font-family:'Syne',sans-serif;font-weight:800;color:var(--accent)">${(item.price*item.qty).toLocaleString()}₸</div>
          </div>
          <div class="qty-ctrl" style="padding:.75rem">
            <button class="qty-btn qty-btn-minus" onclick="updQty(${item.id},-1)">−</button>
            <span class="qty-num">${item.qty}</span>
            <button class="qty-btn qty-btn-plus" onclick="updQty(${item.id},1)">+</button>
          </div>
        </div>`;
      }).join("")}

      <!-- ADDRESS -->
      <div class="card" style="padding:1.25rem;margin-top:1.25rem">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:.75rem">📍 ${t("addr")}</h4>
        <input class="inp" value="${S.address}" oninput="S.address=this.value;LSS('addr',this.value)"/>
      </div>

      <!-- PAYMENT -->
      <div class="card" style="padding:1.25rem;margin-top:.75rem">
        <h4 style="font-size:14px;font-weight:700;margin-bottom:.75rem">💳 ${t("pay")}</h4>

          <div class="pay-opt ${S.payMethod===o.id?"sel":""}" style="margin-bottom:8px" onclick="S.payMethod='${o.id}';R()">
            <div style="display:flex;align-items:center;gap:12px">
              <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${S.payMethod===o.id?"var(--accent)":"var(--text3)"};display:flex;align-items:center;justify-content:center">

          <button class="btn btn-card" onclick="applyPromo()">${t("apply")}</button>

      `:`<div style="color:var(--green);font-size:13px;font-weight:600;margin-top:.75rem;padding:.75rem;background:rgba(0,214,143,.08);border-radius:12px;border:1px solid rgba(0,214,143,.2)">✅ FIRST20 ${S.lang==="ru"?"применён":"қолданылды"}!</div>`}

      <!-- SUMMARY -->
      <div class="card" style="padding:1.25rem;margin-top:.75rem;margin-bottom:1.5rem">
        <div style="display:grid;gap:10px;margin-bottom:1rem">
          <div style="display:flex;justify-content:space-between;font-size:14px">

            <span>${del===0?`<span style="color:var(--green)">${t("free")}</span>`:del+"₸"}</span>
          </div>
          ${S.promoApplied?`<div style="display:flex;justify-content:space-between;font-size:14px">
            <span style="color:var(--green)">Скидка −20%</span>
            <span style="color:var(--green)">−${disc.toLocaleString()}₸</span>
          </div>`:""}
          <div style="border-top:1px solid var(--border);padding-top:10px;display:flex;justify-content:space-between">
            <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px">${t("total")}</span>
            <span style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${total.toLocaleString()}₸</span>
          </div>

        <button class="btn btn-fire" style="width:100%;padding:16px;font-size:15px;border-radius:16px" onclick="S.payTotal=${total};S.payStage=1;go('payment')">

        </button>
        <div style="text-align:center;font-size:11px;color:var(--text3);margin-top:8px">🔒 SSL ${S.lang==="ru"?"Безопасная оплата":"Қауіпсіз төлем"}</div>
      </div>
    </div>
  </div>`;
}

function applyPromo(){
  const v=document.getElementById("promo-inp")?.value||"";
  if(v.toUpperCase()==="FIRST20"){S.promoApplied=true;toast("✅ Промокод FIRST20 "+t("added")+"!");R();}
  else toast("❌ "+(S.lang==="ru"?"Промокод не найден":"Промокод табылмады"));
}

    return `<div class="page" style="display:flex;align-items:center;justify-content:center;min-height:100vh">
      <div style="text-align:center;padding:2rem;max-width:360px">
        <div style="width:90px;height:90px;background:rgba(0,214,143,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:44px">✅</div>

        <div style="background:rgba(0,214,143,.06);border:1px solid rgba(0,214,143,.2);border-radius:20px;padding:1.5rem;margin-bottom:2rem">
          <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--green)">${total.toLocaleString()}₸</div>
          <div style="color:var(--text2);font-size:13px;margin-top:4px">${S.lang==="ru"?"Успешно оплачено":"Сәтті төленді"}</div>

  if(S.payMethod==="kaspi") return bKaspi(total);
  if(S.payMethod==="card") return bCard(total);

  return `<div class="page">
    <div class="main-header"><div class="container"><div class="header-inner">
      <button class="btn btn-ghost btn-sm" onclick="go('cart')">← ${t("back")}</button>
      <span style="font-family:'Syne',sans-serif;font-weight:800">💵 ${t("pay")}</span>
      <div></div>
    </div></div></div>

// ===== MAP CANVAS =====
function drawMap(canvas,status){
  if(!canvas) return;
  const ctx=canvas.getContext("2d");
  const W=canvas.width,H=canvas.height;
  const route=[{x:.1,y:.82},{x:.22,y:.65},{x:.38,y:.58},{x:.52,y:.45},{x:.67,y:.32},{x:.82,y:.2}];
  const sm={placed:0,prep:.1,ready:.15,pickup:.5,done:1};
  const tp=sm[status]||0;
  function lerp(a,b,t){return a+(b-a)*t;}
  function lerpPt(pts,t){
    const sg=pts.length-1; const i=Math.min(Math.floor(t*sg),sg-1);
    const lt=t*sg-i; return{x:lerp(pts[i].x,pts[i+1].x,lt),y:lerp(pts[i].y,pts[i+1].y,lt)};
  }
  ctx.fillStyle="#0a0a18"; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle="rgba(255,255,255,.025)"; ctx.lineWidth=1;
  for(let i=0;i<14;i++){
    ctx.beginPath();ctx.moveTo(i*W/13,0);ctx.lineTo(i*W/13,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*H/13);ctx.lineTo(W,i*H/13);ctx.stroke();
  }
  const roads=[[.1,.9,.5,.4,.9,.1],[0,.45,1,.45],[.45,0,.55,1],[0,.25,1,.7],[.2,0,.85,1]];
  ctx.strokeStyle="rgba(255,255,255,.06)"; ctx.lineWidth=4;
  for(let i=0;i<roads.length;i+=2){
    if(roads[i+1]){
      const r=roads[i];
      ctx.beginPath();ctx.moveTo(r[0]*W,r[1]*H);
      for(let j=2;j<r.length;j+=2)ctx.lineTo(r[j]*W,r[j+1]*H);
      ctx.stroke();
    }
  }
  [[0,.9,.5,.4,.9,.1],[0,.45,1,.45],[.45,0,.55,1],[0,.25,1,.7],[.2,0,.85,1]].forEach(pts=>{
    if(pts.length<4)return;
    ctx.strokeStyle="rgba(255,255,255,.06)";ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(pts[0]*W,pts[1]*H);
    for(let j=2;j<pts.length;j+=2)ctx.lineTo(pts[j]*W,pts[j+1]*H);
    ctx.stroke();
  });
  ctx.strokeStyle="rgba(255,69,0,.2)";ctx.lineWidth=2;ctx.setLineDash([6,5]);
  ctx.beginPath();ctx.moveTo(route[0].x*W,route[0].y*H);
  route.forEach(p=>ctx.lineTo(p.x*W,p.y*H));ctx.stroke();ctx.setLineDash([]);
  ctx.strokeStyle="var(--accent)";ctx.lineWidth=3;
  ctx.beginPath();
  for(let i=0;i<=60;i++){
    const pt=lerpPt(route,Math.min(i/60,tp));
    i===0?ctx.moveTo(pt.x*W,pt.y*H):ctx.lineTo(pt.x*W,pt.y*H);
  }ctx.stroke();
  const dst=route[route.length-1];
  ctx.shadowColor="#4a9eff";ctx.shadowBlur=18;
  ctx.fillStyle="#4a9eff";ctx.beginPath();ctx.arc(dst.x*W,dst.y*H,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(dst.x*W,dst.y*H,4,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  const pos=lerpPt(route,tp);
  ctx.shadowColor="var(--accent)";ctx.shadowBlur=22;
  ctx.fillStyle="var(--accent)";ctx.beginPath();ctx.arc(pos.x*W,pos.y*H,14,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 13px sans-serif";
  ctx.textAlign="center";ctx.textBaseline="middle";
  ctx.fillText("🛵",pos.x*W,pos.y*H+1);ctx.shadowBlur=0;
  const pulse=(Date.now()%1200)/1200;
  ctx.strokeStyle=`rgba(255,69,0,${.5*(1-pulse)})`;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(pos.x*W,pos.y*H,14+pulse*24,0,Math.PI*2);ctx.stroke();
}

function doLogout(){S.adminIn=false;LSS("adm",false);go("home");toast("👋 "+( S.lang==="ru"?"Вышли из системы":"Жүйеден шықтыңыз"));}

// ===== EVENTS =====
function attachEv(){
  const ap=document.getElementById("ap");
  if(ap) ap.addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  window.fmtCard=function(inp){
    let v=inp.value.replace(/\D/g,"").substring(0,16);
    inp.value=v.replace(/(.{4})/g,"$1 ").trim();
    const d=document.getElementById("cn-disp");
    if(d){const p=(v+"").padEnd(16,"•");d.textContent=p.replace(/(.{4})/g,"$1 ").trim();}
  };
  window.fmtExp=function(inp){
    let v=inp.value.replace(/\D/g,"");
    if(v.length>=2)v=v.substring(0,2)+"/"+v.substring(2,4);
    inp.value=v;
    const d=document.getElementById("cexp-disp");
    if(d)d.textContent=v||"MM/YY";
  };
  // Map loop
  if(document.getElementById("map-cv")||document.getElementById("cou-map")){
    (function loop(){
      const mc=document.getElementById("map-cv");
      const cc=document.getElementById("cou-map");
      if(mc||cc){
        if(mc)drawMap(mc,STATUSES_RU[S.trackStep]?.key||"placed");
        if(cc)drawMap(cc,["placed","prep","pickup","done"][S.couStep]||"placed");
        requestAnimationFrame(loop);
      }
    })();
  }
}
